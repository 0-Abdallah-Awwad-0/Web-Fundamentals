<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Profile</title>
</head>

<body>

<header>
    <nav>
        <h1>Profile</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Connections</a></li>
            <li><button>Logout</button></li>
        </ul>
    </nav>
</header>

<main>

    <section>
        
        <article>
            <header>
                <img src="avatar.jpg" alt="">
                <h2>Jane Doe</h2>
                <p>Seattle</p>
            </header>

            <p>Developer | Engineer</p>

            <footer>
                <a href="#">Edit Profile</a>
            </footer>
        </article>

        <article>
            <header>
                <h2>Education</h2>
            </header>
            <p>Full Stack Bootcamp</p>
        </article>

    </section>

    <aside>

        <section>
            <header>
                <h2>Connection Requests</h2>
            </header>
            <ul>
                <li>Todd</li>
                <li>Phil</li>
            </ul>
        </section>

        <section>
            <header>
                <h2>Your Connections</h2>
            </header>
            <ul>
                <li>Adrien</li>
                <li>Anne</li>
            </ul>

            <footer>
                <a href="#">View More</a>
            </footer>
        </section>

    </aside>

</main>

<footer>
    <p>© 2026</p>
</footer>

</body>
</html>
