<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG House Structure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
        
        <rect width="500" height="300" fill="#f0f8ff" />

        <line x1="0" y1="300" x2="500" y2="300" stroke="green" stroke-width="10" />

        <circle cx="400" cy="80" r="40" fill="yellow" stroke="orange" stroke-width="2" />

        <rect x="130" y="110" width="30" height="60" fill="#7d4a25" stroke="black" />

        <rect x="100" y="170" width="250" height="130" fill="#f4c57a" stroke="black" stroke-width="2" />

        <polygon points="75,170 375,170 225,70" fill="#d33f3f" stroke="black" stroke-width="2" />

        <rect x="130" y="200" width="50" height="50" fill="lightblue" stroke="black" stroke-width="2" />

        <rect x="210" y="230" width="50" height="70" fill="#7d4a25" stroke="black" stroke-width="2" />

        <g fill="white" opacity="0.8">
            <circle cx="50" cy="50" r="20" />
            <circle cx="75" cy="50" r="25" />
            <circle cx="100" cy="50" r="20" />
        </g>

    </svg>

</body>
</html>
