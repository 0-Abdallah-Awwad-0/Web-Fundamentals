<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Members - Masking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">Our Team Members</h1>

  <div class="team-grid">

    <!-- Member 1 (circle mask) -->
    <div class="card">
      <img class="mask-circle" src="https://i.pravatar.cc/300?img=1" alt="member">
      <h3>Ahmed Ali</h3>
      <p>Frontend Developer</p>
    </div>

    <!-- Member 2 (rounded rectangle mask) -->
    <div class="card">
      <img class="mask-rounded" src="https://i.pravatar.cc/300?img=2" alt="member">
      <h3>Sara Youssef</h3>
      <p>UI Designer</p>
    </div>

    <!-- Member 3 (gradient fade mask) -->
    <div class="card">
      <img class="mask-fade" src="https://i.pravatar.cc/300?img=3" alt="member">
      <h3>Omar Hassan</h3>
      <p>Backend Developer</p>
    </div>

    <!-- Member 4 (SVG mask style) -->
    <div class="card">
      <img class="mask-blob" src="https://i.pravatar.cc/300?img=4" alt="member">
      <h3>Lina Khaled</h3>
      <p>Project Manager</p>
    </div>

  </div>

</body>
</html>
