<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Styling Assignment</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Lobster&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Web-safe font stack -->
  <h1>Main Heading with Web-Safe Fonts</h1>

  <!-- Custom font (@font-face) -->
  <h2>Subheading with Custom Font</h2>

  <!-- Google Font -->
  <p class="google-font">
    This paragraph uses a Google Font (Roboto). It demonstrates how to load and apply fonts from Google Fonts.
  </p>

  <!-- Bonus: second Google Font -->
  <p class="google-font-alt">
    This is another paragraph using a different Google Font (Lobster).
  </p>

  <!-- Small monospace text -->
  <small class="mono-text">
    This is small monospace fallback text.
  </small>

</body>
</html>
