<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="panel player-panel">
            <div class="cover-icon">
                🎵 </div>

            <div class="track-info">
                <span class="label">Now Playing</span>
                <h1 id="track-title">Powerful Percussion</h1>
                <p id="track-artist">By Energysound</p>
            </div>

            <audio id="audio-player" controls>
                <source src="energysound-powerful-percussion-513717 (1).mp3" type="audio/mp3">
                <source src="magpiemusic-action-man-the-action-sport-513684.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
        </section>

        <aside class="panel playlist-panel">
            <h2 class="playlist-title">Playlist</h2>

            <ul class="playlist" id="playlist">
                <li class="track active" onclick="playSong('Powerful Percussion', 'By Energysound', 'energysound-powerful-percussion-513717 (1).mp3', this)">
                    Track 1 — Powerful Percussion
                </li>

                <li class="track" onclick="playSong('Action Man', 'By MagpieMusic', 'magpiemusic-action-man-the-action-sport-513684.mp3', this)">
                    Track 2 — Action Man
                </li>

                <li class="track" onclick="playSong('Action Trailer Promo', 'By MagpieMusic', 'magpiemusic-action-trailer-promo-rock-513687.mp3', this)">
                    Track 3 — Action Trailer Promo
                </li>
            </ul>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
