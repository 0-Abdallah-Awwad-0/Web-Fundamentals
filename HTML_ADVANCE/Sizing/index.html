<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Elements Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Responsive Elements Showcase</h1>

    <div class="card">
        <div class="section-title">1. Shrinking Image</div>
        <img src="https://via.placeholder.com/600x300" alt="Placeholder Image" class="shrinking-img">
    </div>

    <div class="card">
        <div class="section-title">2. Button That Never Becomes Too Small</div>
        <button class="min-width-btn">Click Me!</button>
    </div>

    <div class="card">
        <div class="section-title">3. Box Only as Wide as Its Text</div>
        <div class="fit-content-box">
            This box hugs its content perfectly.
        </div>
    </div>

    <div class="card">
        <div class="section-title">4. Width with Fixed Offset</div>
        <div class="calc-box">
            Calculated Width (100vw - 80px)
        </div>
    </div>

    <div class="card">
        <div class="section-title">5. Resizable Box</div>
        <div class="clamp-box">
            Clamp Box (Min: 200px, Max: 400px)
        </div>
    </div>

</body>
</html>
