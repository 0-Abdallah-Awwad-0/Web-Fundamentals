<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - Homework Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>StudyHub</h1>
        <div class="user-icon">👤</div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <h2>StudyHub</h2>
            <ul>
                <li>🏠 Home</li>
                <li>📊 My Results</li>
                <li>📄 Submissions</li>
                <li class="active">📚 Homeworks</li>
                <li>⚙️ Settings</li>
            </ul>
        </aside>

        <main class="content">
            
            <section class="card">
                <div class="card-header">
                    <span>🎧</span>
                    <h3>Teacher Explanation</h3>
                </div>
                <p>Listen to the homework instructions.</p>
                <audio controls>
                    <source src="teacher-instructions.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </section>

            <section class="card">
                <div class="card-header">
                    <span>📄</span>
                    <h3>Homework Document</h3>
                </div>
                <p>Your homework file:</p>
                
                <div class="pdf-container">
                    <iframe src="assignment.pdf" title="Homework Assignment PDF"></iframe>
                </div>
            </section>

        </main>
    </div>

</body>
</html>
