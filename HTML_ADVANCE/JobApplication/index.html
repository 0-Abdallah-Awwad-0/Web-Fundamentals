<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Application</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="application-wrapper">
        <h2>🚀 Join Our Team</h2>

        <form>

            <div class="input-group">
                <label class="required">Full Name</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label class="required">Email</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label class="required">Phone</label>
                <input type="tel" required>
            </div>

            <div class="input-group">
                <label>Experience (Years)</label>
                <input type="number" min="0" max="25" placeholder="e.g. 3">
            </div>

            <fieldset>
                <legend>Work Preference</legend>
                <label><input type="radio" name="type" required> Remote</label>
                <label><input type="radio" name="type"> Office</label>
                <label><input type="radio" name="type"> Hybrid</label>
            </fieldset>

            <div class="input-group">
                <label class="required">Upload Resume (PDF)</label>
                <input type="file" accept=".pdf" required>
            </div>

            <div class="input-group">
                <label>Application Code</label>
                <input type="text" value="CAND-48291" readonly>
            </div>

            <div class="input-group">
                <label>Why should we hire you?</label>
                <textarea rows="4"></textarea>
            </div>

            <div class="input-group">
                <label>Expected Salary: $<span id="salaryValue">50000</span></label>
                <input type="range" min="20000" max="120000" step="5000" value="50000"
                    oninput="salaryValue.innerText = this.value">
            </div>

            <div class="input-group">
                <label>Available From</label>
                <input type="date">
            </div>

            <div class="actions">
                <button type="submit" class="submit-btn">Apply Now</button>
                <button type="reset" class="reset-btn">Clear</button>
            </div>

        </form>
    </div>

</body>

</html>
