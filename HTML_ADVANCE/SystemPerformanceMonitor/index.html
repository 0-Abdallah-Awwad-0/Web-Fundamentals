<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live System Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard">
        <h1>💻 Live System Dashboard</h1>

        <div class="stats-grid">

            <div class="box">
                <h3>CPU Load</h3>
                <meter value="0.65" min="0" max="1" low="0.4" high="0.85"></meter>
                <p>Current: 65%</p>
            </div>

            <div class="box">
                <h3>Memory Usage</h3>
                <meter value="8" min="0" max="16"></meter>
                <p>8GB / 16GB</p>
            </div>

            <div class="box">
                <h3>Storage Space</h3>
                <meter value="380" min="0" max="512" high="420"></meter>
                <p>380GB used</p>
            </div>

            <div class="box">
                <h3>Download Progress</h3>
                <progress value="55" max="100"></progress>
                <p>55% completed</p>
            </div>

            <div class="box">
                <h3>Internet Traffic</h3>
                <progress value="25" max="100"></progress>
                <p>25% load</p>
            </div>

            <div class="box">
                <h3>Background Processes</h3>
                <progress value="60" max="100"></progress>
                <p>60% active</p>
            </div>

        </div>
    </div>

</body>

</html>
