<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoLab</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- top navigation -->
    <div class="top">
        <div class="nav-container">
            <h1>VideoLab</h1>
            <input type="text" placeholder="Search" name="query" class="search">
            <button class="btn">Login</button>
        </div>
    </div>

    <!-- main content -->
    <div class="flex-container">

        <!-- left column -->
        <div class="col-l">
            <video src="/assets/NatureGlance.mp4" width="720" height="400" controls onmouseover="playVideo(this)"
                onmouseout="pauseVideo(this)"></video>

            <div class="row">
                <div class="start">
                    <h1>"Nature Glance"</h1>
                    <h3>1.4M Views | March, 25, 2026</h3>
                    <div class="user">
                        <img src="me.jpg" alt="user-circle" class="avatar-s">
                        <span class="user-name">Abdallah Awwad</span>
                    </div>
                </div>
                <button class="btn" onclick="alert('PayAttention')">Subscribe</button>
            </div>

        </div>

        <!-- right column -->
        <div class="col-r">

            <h3 class="sub-header">Up Next</h3>

            <div class="video-small">
                <video src="/assets/tree.mp4" width="168" class="vid-s" controls></video>"
                <span class="video-title">"trees landscape"</span>
            </div>

            <div class="video-small">
                <video src="/assets/ice age.mp4" controls height="113" class="vid-s"></video>
                <span class="video-title">"ice age"</span>
            </div>

            <div class="video-small">
                <video src="/assets/waves.mp4" width="168" height="113" controls class="vid-s"></video>
                <span class="video-title">"waves of the sea"</span>
            </div>

            <div class="video-small">
                <video src="/assets/dark night.mp4" controls class="vid-s"></video>
                <span class="video-title">"a city light"</span>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
